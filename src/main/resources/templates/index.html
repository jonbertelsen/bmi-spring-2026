<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
<title>Frontpage</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../public/css/styles.css" th:href="@{/css/styles.css}" rel="stylesheet"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>
<h1>BMI Calculator</h1>
<p>Tør du?</p>

<form id="bmi-form" method="post">
    <input type="text" name="name" placeholder="Indtast navn" required/>
    <input type="number" name=weight placeholder="Indtast vægt i kg" required/>
    <input type="number" name=height placeholder="Indtast højde i cm" required/>
    <button type="submit" th:formaction="@{/result}">Beregn</button>
</form>
<div class="error-message">
    <p th:text="${error}"></p>
</div>

</body>
</html>
