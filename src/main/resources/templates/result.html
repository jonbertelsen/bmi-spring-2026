<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<title>Frontpage</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="../public/css/styles.css" th:href="@{/css/styles.css}" rel="stylesheet"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>
<div id = "content">
<h1>BMI Calculator</h1>
<h2 th:text="${'Hej ' + bmiEntity.name}"></h2>
<p>Her er dit resultat</p>

<h1 th:text="${#numbers.formatDecimal(bmiEntity.bmi, 1, 2)}"></h1>

<h2>Vurdering</h2>
<p>Dit BMI placerer dig i kategorien:</p>
<p th:text="${bmiEntity.verdict}"></p>

<h2 th:text="${'Weight: ' + bmiEntity.weight}"></h2>

    <form method="GET">
        <button type="submit" th:formaction="@{/}">Til forsiden</button>
    </form>

    <a class="link-button" th:href="@{/}">Til forsiden</a>



</div>
</body>
</html>
